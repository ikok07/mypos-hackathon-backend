apiVersion: api.cerbos.dev/v1
resourcePolicy:
    resource: profile_balance
    version: default
    rules:
        - name: allow_full_access_for_admin
          actions: ["select", "insert", "update", "delete"]
          roles:
              - admin
          effect: EFFECT_ALLOW
        - name: allow_read_access_for_staff
          actions: ["select"]
          roles:
              - worker
          effect: EFFECT_ALLOW
